<!DOCTYPE html>
<html>
<head>
  <!-- Моментальное перенаправление через мета-тег -->
  <meta http-equiv="refresh" content="0; url=https://github.io">
  <title>Перенаправление...</title>
</head>
<body>
  <!-- Ссылка на случай, если у пользователя отключен JavaScript -->
  <p>Если перенаправление не произошло, <a href="https://github.io">нажмите сюда</a>.</p>
  
  <script>
    // Запасное перенаправление через JavaScript
    window.location.href = "https://github.io";
  </script>
</body>
</html>
